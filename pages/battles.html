<section class="battles-page">


    <!-- =========================
         Header
    ========================== -->

    <section class="page-section">


        <div class="page-section-header">


            <h1 class="page-section-title">

                バトル戦績

            </h1>


        </div>


    </section>



    <!-- =========================
         Search
    ========================== -->


    <section class="search-area">


        <div class="search-box">


            <span class="search-icon">

                🔍

            </span>


            <input

                type="search"

                id="battleSearch"

                class="search-input"

                placeholder="ステージ・ブキ・ルールを検索"

            >


        </div>


    </section>



    <!-- =========================
         Filters
    ========================== -->


    <section>


        <div
            class="filter-row"
            id="battleFilters"
        >


            <button

                class="filter-button active"

                data-filter="all"

            >

                すべて

            </button>



            <button

                class="filter-button"

                data-filter="win"

            >

                勝利

            </button>



            <button

                class="filter-button"

                data-filter="lose"

            >

                敗北

            </button>



            <button

                class="filter-button"

                data-filter="ranked"

            >

                バンカラ

            </button>



            <button

                class="filter-button"

                data-filter="territory"

            >

                ナワバリ

            </button>


        </div>


    </section>



    <!-- =========================
         Sort
    ========================== -->


    <section class="page-section">


        <select

            id="battleSort"

            class="select"

        >


            <option value="latest">

                新しい順

            </option>


            <option value="oldest">

                古い順

            </option>


            <option value="winrate">

                勝率順

            </option>


            <option value="kills">

                キル数順

            </option>


        </select>


    </section>



    <!-- =========================
         Battle List
    ========================== -->


    <section class="page-section">


        <div class="page-section-header">


            <h2 class="page-section-title">

                試合一覧

            </h2>


        </div>



        <div

            id="battleList"

            class="battle-list"

        >


            <!-- JavaScriptで生成 -->


        </div>


    </section>


</section>
    <!-- =========================
         Battle Card Template
    ========================== -->


    <template id="battleCardTemplate">


        <article class="battle-card">


            <!-- Header -->

            <div class="battle-card-header">


                <div class="battle-info">


                    <span class="battle-rule">

                        ルール

                    </span>


                    <span class="battle-time">

                        時間

                    </span>


                </div>



                <span class="battle-result">

                    WIN

                </span>


            </div>



            <!-- Stage -->


            <div class="battle-stage">


                <div class="stage-image">

                </div>


                <div class="stage-info">


                    <h3 class="stage-name">

                        ステージ名

                    </h3>


                    <p class="stage-mode">

                        ルール名

                    </p>


                </div>


            </div>



            <!-- Weapon -->


            <div class="battle-weapon">


                <div class="weapon-image">

                </div>


                <div>


                    <p class="weapon-label">

                        使用ブキ

                    </p>


                    <p class="weapon-name">

                        ブキ名

                    </p>


                </div>


            </div>



            <!-- Stats -->


            <div class="battle-stats">


                <div class="battle-stat">


                    <span>

                        キル

                    </span>


                    <strong class="kills">

                        --

                    </strong>


                </div>



                <div class="battle-stat">


                    <span>

                        デス

                    </span>


                    <strong class="deaths">

                        --

                    </strong>


                </div>



                <div class="battle-stat">


                    <span>

                        アシスト

                    </span>


                    <strong class="assists">

                        --

                    </strong>


                </div>



                <div class="battle-stat">


                    <span>

                        塗り

                    </span>


                    <strong class="paint">

                        --

                    </strong>


                </div>


            </div>



            <!-- Result Details -->


            <div class="battle-footer">


                <span class="battle-rank">

                    ウデマエ

                </span>


                <button

                    class="battle-detail-button"

                >

                    詳細を見る

                </button>


            </div>


        </article>


    </template>



    <!-- =========================
         Empty State
    ========================== -->


    <section

        id="battleEmpty"

        class="empty-state hidden"

    >


        <div class="empty-icon">

            📊

        </div>


        <h3>

            戦績がありません

        </h3>


        <p>

            Nintendo Accountを連携すると
            戦績を取得できます。

        </p>


    </section>
        <!-- =========================
         Battle Detail Preview
    ========================== -->


    <section
        id="battleDetailPanel"
        class="battle-detail-page hidden"
    >


        <!-- Summary -->


        <div class="battle-summary">


            <div class="summary-box">


                <p class="summary-label">

                    結果

                </p>


                <p
                    id="detailResult"
                    class="summary-value"
                >

                    WIN

                </p>


            </div>



            <div class="summary-box">


                <p class="summary-label">

                    スコア

                </p>


                <p
                    id="detailScore"
                    class="summary-value"
                >

                    --

                </p>


            </div>



            <div class="summary-box">


                <p class="summary-label">

                    キル

                </p>


                <p
                    id="detailKills"
                    class="summary-value"
                >

                    --

                </p>


            </div>



            <div class="summary-box">


                <p class="summary-label">

                    デス

                </p>


                <p
                    id="detailDeaths"
                    class="summary-value"
                >

                    --

                </p>


            </div>


        </div>



        <!-- Result Image -->


        <div class="result-image">


            <img

                id="resultImage"

                src=""

                alt="リザルト画像"

            >


        </div>



        <!-- Players -->


        <section class="team-section">


            <h2 class="team-title">


                <span class="team-color ally"></span>


                味方チーム


            </h2>



            <div

                id="allyPlayers"

                class="player-list"

            >

            </div>


        </section>




        <section class="team-section">


            <h2 class="team-title">


                <span class="team-color enemy"></span>


                相手チーム


            </h2>



            <div

                id="enemyPlayers"

                class="player-list"

            >

            </div>


        </section>



        <!-- Same Match Players -->


        <section class="page-section">


            <div class="page-section-header">


                <h2 class="page-section-title">

                    同じ試合のプレイヤー

                </h2>


            </div>



            <div

                id="matchPlayers"

                class="player-list"

            >

            </div>


        </section>



        <!-- Actions -->


        <div class="data-actions">


            <button

                id="saveBattleButton"

                class="btn btn-primary"

            >

                戦績を保存

            </button>



            <button

                id="shareBattleButton"

                class="btn btn-secondary"

            >

                共有

            </button>


        </div>


    </section>
        <!-- =========================
         Player Card Template
    ========================== -->


    <template id="playerCardTemplate">


        <article class="player-card">


            <div class="player-header">


                <div class="player-icon">

                </div>


                <div class="player-info">


                    <h3 class="player-name">

                        プレイヤー名

                    </h3>


                    <p class="player-weapon">

                        ブキ名

                    </p>


                </div>


            </div>



            <div class="player-stats">


                <div class="player-stat">


                    <span>

                        キル

                    </span>


                    <strong class="player-kills">

                        --

                    </strong>


                </div>



                <div class="player-stat">


                    <span>

                        デス

                    </span>


                    <strong class="player-deaths">

                        --

                    </strong>


                </div>



                <div class="player-stat">


                    <span>

                        スペシャル

                    </span>


                    <strong class="player-special">

                        --

                    </strong>


                </div>



                <div class="player-stat">


                    <span>

                        塗り

                    </span>


                    <strong class="player-paint">

                        --

                    </strong>


                </div>


            </div>



            <div class="player-awards">


                <span class="award-badge">

                    表彰

                </span>


            </div>


        </article>


    </template>



    <!-- =========================
         Battle Metadata
    ========================== -->


    <section class="page-section">


        <div class="page-section-header">


            <h2 class="page-section-title">

                試合情報

            </h2>


        </div>



        <div class="dashboard-grid">


            <div class="dashboard-item">


                <div class="dashboard-label">

                    開始時刻

                </div>


                <div

                    id="battleDate"

                    class="dashboard-value"

                >

                    --

                </div>


            </div>



            <div class="dashboard-item">


                <div class="dashboard-label">

                    通信状態

                </div>


                <div

                    id="battleConnection"

                    class="dashboard-value"

                >

                    --

                </div>


            </div>



            <div class="dashboard-item">


                <div class="dashboard-label">

                    ステージ

                </div>


                <div

                    id="battleStage"

                    class="dashboard-value"

                >

                    --

                </div>


            </div>



            <div class="dashboard-item">


                <div class="dashboard-label">

                    ルール

                </div>


                <div

                    id="battleRule"

                    class="dashboard-value"

                >

                    --

                </div>


            </div>


        </div>


    </section>



    <!-- =========================
         Battle Analysis Link
    ========================== -->


    <section class="data-card">


        <div class="data-title">

            この試合を分析

        </div>


        <div class="data-description">


            ブキ別・ステージ別・スペシャル別の
            成績を分析できます。


        </div>



        <div class="data-actions">


            <button

                class="btn btn-primary"

                data-page="analysis"

            >

                分析を見る

            </button>


        </div>


    </section>
        <!-- =========================
         Loading State
    ========================== -->


    <section

        id="battleLoading"

        class="loading-page hidden"

    >


        <div class="spinner">

        </div>


        <p class="loading-text">

            戦績データを取得中...

        </p>


    </section>



    <!-- =========================
         Error State
    ========================== -->


    <section

        id="battleError"

        class="error-page hidden"

    >


        <div class="error-code">

            !

        </div>


        <h2 class="error-title">

            データ取得エラー

        </h2>


        <p class="error-text">


            戦績データを取得できませんでした。
            通信状態を確認してください。


        </p>



        <button

            id="battleRetryButton"

            class="btn btn-primary"

        >

            再取得

        </button>


    </section>



    <!-- =========================
         Battle Statistics Summary
    ========================== -->


    <section class="page-section">


        <div class="page-section-header">


            <h2 class="page-section-title">

                戦績まとめ

            </h2>


        </div>



        <div class="dashboard-grid">


            <div class="dashboard-item">


                <div class="dashboard-label">

                    総勝利数

                </div>


                <div

                    id="totalWins"

                    class="dashboard-value"

                >

                    --

                </div>


            </div>



            <div class="dashboard-item">


                <div class="dashboard-label">

                    総敗北数

                </div>


                <div

                    id="totalLosses"

                    class="dashboard-value"

                >

                    --

                </div>


            </div>



            <div class="dashboard-item">


                <div class="dashboard-label">

                    平均キル

                </div>


                <div

                    id="averageKills"

                    class="dashboard-value"

                >

                    --

                </div>


            </div>



            <div class="dashboard-item">


                <div class="dashboard-label">

                    平均塗り

                </div>


                <div

                    id="averagePaint"

                    class="dashboard-value"

                >

                    --

                </div>


            </div>


        </div>


    </section>



</section>
